      number: 22
      inverted: false

  - platform: gpio
    id: sprinkler_valve_sw7
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: sn74hc595_hub
      number: 23
      inverted: false

output:
  - platform: gpio
    id: segment_a
    pin:
      sn74hc595: sn74hc595_hub
      number: 0
      inverted: false

  - platform: gpio
    id: segment_b
    pin:
      sn74hc595: sn74hc595_hub
      number: 1
      inverted: false

  - platform: gpio
    id: segment_c
    pin:
      sn74hc595: sn74hc595_hub
      number: 2
      inverted: false

  - platform: gpio
    id: segment_d
    pin:
      sn74hc595: sn74hc595_hub
      number: 3
      inverted: false

  - platform: gpio
    id: segment_e
    pin:
      sn74hc595: sn74hc595_hub
      number: 4
      inverted: false

  - platform: gpio
    id: segment_f
    pin:
      sn74hc595: sn74hc595_hub
      number: 5
