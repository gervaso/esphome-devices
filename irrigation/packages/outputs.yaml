sn74hc595:
  - id: sn74hc595_hub
    data_pin: GPIO13
    clock_pin: GPIO27
    latch_pin: GPIO14
    oe_pin: GPIO4
    sr_count: 3

switch:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Master Valve"
    id: sprinkler_master_valve
    register_type: coil
    address: 0

  - platform: gpio
    id: sprinkler_valve_sw0
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: sn74hc595_hub
      number: 16
      inverted: false

  - platform: gpio
    id: sprinkler_valve_sw1
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: sn74hc595_hub
      number: 17
      inverted: false

  - platform: gpio
    id: sprinkler_valve_sw2
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: sn74hc595_hub
      number: 18
      inverted: false

  - platform: gpio
    id: sprinkler_valve_sw3
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: sn74hc595_hub
      number: 19
      inverted: false

  - platform: gpio
    id: sprinkler_valve_sw4
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: sn74hc595_hub
      number: 20
      inverted: false

  - platform: gpio
    id: sprinkler_valve_sw5
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: sn74hc595_hub
      number: 21
      inverted: false

  - platform: gpio
    id: sprinkler_valve_sw6
    restore_mode: ALWAYS_OFF
    pin:
